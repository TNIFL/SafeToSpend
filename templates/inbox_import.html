<!-- templates/inbox_import.html -->
{% extends "base.html" %}

{% block title %}내역 가져오기 | 쓸수있어{% endblock %}

{% block content %}
<div class="topbar">
  <div>
    <h1 class="h1" style="margin:0; font-size:1.6rem;">내역 가져오기</h1>
    <p class="lead" style="margin:6px 0 0;">CSV를 올리면 자동 분류/증빙 체크가 시작됩니다.</p>
  </div>
  <a class="btn" href="{{ url_for('web_inbox.index') }}">인박스 돌아가기</a>
</div>

<div class="card pad" style="max-width: 720px;">
  <form action="{{ url_for('web_inbox.import_preview') }}" method="post" enctype="multipart/form-data" class="form-grid">
    <div class="field">
      <div class="label">CSV 파일</div>
      <input type="file" name="csv" accept=".csv,text/csv" required>
      <div class="tiny muted">권장: UTF-8(또는 CP949) / 첫 행 헤더 포함</div>
    </div>

    <div class="helpbox">
      <b>대부분의 은행/카드 CSV OK.</b><br>
      다음 화면에서 컬럼만 연결하면 됩니다.
    </div>

    <div style="display:flex; gap:10px;">
      <button type="submit" class="btn solid">다음</button>
      <a class="btn" href="{{ url_for('web_inbox.index') }}">취소</a>
    </div>
  </form>
</div>
{% endblock %}
