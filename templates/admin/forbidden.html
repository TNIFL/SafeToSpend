{% extends "base.html" %}
{% block title %}관리자 권한 필요 | 쓸수있어{% endblock %}

{% block content %}
<div class="wrap">
  <section class="card pad" style="max-width:760px;margin:28px auto;">
    <h1 style="margin:0 0 10px;">접근 권한이 없어요</h1>
    <p class="muted2" style="margin:0 0 16px;line-height:1.6;">
      {{ message or "관리자만 접근할 수 있는 페이지예요." }}
    </p>
    <div class="row" style="gap:8px;flex-wrap:wrap;">
      <a class="btn ghost" href="{{ url_for('web_main.landing') }}">메인으로</a>
      <a class="btn ghost" href="{{ url_for('web_profile.mypage') }}">내 계정</a>
    </div>
  </section>
</div>
{% endblock %}
