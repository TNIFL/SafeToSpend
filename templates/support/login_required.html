{% extends "base.html" %}
{% block title %}문의 | 쓸수있어{% endblock %}

{% block content %}
<div class="container" style="max-width:760px;">
  <div class="page-head">
    <div class="page-head-main">
      <div class="h1">문의</div>
      <div class="p">문의 작성과 답변 확인은 로그인 후 이용할 수 있어요.</div>
    </div>
  </div>

  <div class="card pad">
    <div class="cardTitle"><span>로그인이 필요해요</span></div>
    <div class="small-note muted2" style="margin-top:10px; line-height:1.6;">
      계정으로 로그인하면 문의를 남기고, 답변 상태를 바로 확인할 수 있어요.
    </div>
    <div class="row" style="gap:8px; margin-top:14px; flex-wrap:wrap;">
      <a class="btn primary" href="{{ login_url }}">로그인</a>
      <a class="btn ghost" href="{{ register_url }}">회원가입</a>
    </div>
  </div>
</div>
{% endblock %}
