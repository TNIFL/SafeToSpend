{% extends "base.html" %}
{% block title %}회원가입 | 쓸수있어{% endblock %}

{% block head_extra %}
<style>
  .auth-wrap{max-width:1100px;margin:0 auto;padding:22px 16px 44px;}
  .auth-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:stretch;}
  .hero{border-radius:22px;border:1px solid rgba(15,23,42,.08);background:linear-gradient(180deg,#fff,rgba(2,6,23,.02));padding:18px;}
  .kicker{display:inline-flex;align-items:center;gap:8px;padding:7px 10px;border-radius:999px;background:rgba(34,197,94,.10);border:1px solid rgba(34,197,94,.18);font-weight:1000;color:#166534;font-size:.85rem;}
  .h1{margin-top:12px;font-size:1.6rem;line-height:1.2;font-weight:1200;letter-spacing:-.8px;}
  .p{margin-top:10px;color:var(--muted);line-height:1.6;}
  .card{border-radius:22px;border:1px solid rgba(15,23,42,.08);background:#fff;padding:18px;}
  .form-grid{margin-top:12px;display:grid;gap:10px;}
  .field .label{display:block;margin-bottom:8px;color:var(--muted);font-weight:900;font-size:.9rem;}
  .field input{width:100%;height:44px;padding:0 12px;border-radius:14px;border:1px solid rgba(15,23,42,.10);background:#fff;}
  .consent-wrap{margin-top:14px;padding:14px;border-radius:18px;border:1px solid rgba(15,23,42,.08);background:rgba(15,23,42,.02);}
  .consent-title{font-weight:1000;letter-spacing:-.2px;}
  .consent-note{margin-top:6px;color:var(--muted);font-size:.92rem;line-height:1.5;}
  .consent-list{margin-top:12px;display:grid;gap:10px;}
  .consent-item{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;border-radius:14px;background:#fff;border:1px solid rgba(15,23,42,.08);}
  .consent-item input{margin-top:3px;flex:0 0 auto;}
  .consent-copy{display:grid;gap:4px;min-width:0;}
  .consent-links{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .consent-links a{font-size:.92rem;}
  .row{margin-top:12px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  @media (max-width:980px){.auth-grid{grid-template-columns:1fr;}}
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-grid">

    <section class="hero">
      <span class="kicker">회원가입</span>
      <div class="h1">저장/반복 사용을 위해<br>계정을 만들어두세요.</div>
      <div class="p">닉네임/생년월일은 DB에서 제거했습니다. (지금 단계에선 실사용 가치가 낮고 장애만 유발)</div>
      <div class="row">
        <a class="btn solid" href="{{ url_for('web_auth.login') }}">이미 계정 있음</a>
        <a class="btn" href="{{ url_for('web_main.landing') }}">랜딩으로</a>
      </div>
    </section>

    <section class="card">
      <div style="font-weight:1100;letter-spacing:-.3px;">계정 만들기</div>

      <form method="POST" action="{{ url_for('web_auth.register') }}" style="margin-top:12px;">
        <div class="form-grid" style="margin-top:0;">
          <label class="field">
            <span class="label">이메일</span>
            <input name="email" type="email" autocomplete="email" required>
          </label>

          <label class="field">
            <span class="label">비밀번호 (8자 이상)</span>
            <input name="password" type="password" autocomplete="new-password" required>
          </label>

          <label class="field">
            <span class="label">비밀번호 확인</span>
            <input name="password2" type="password" autocomplete="new-password" required>
          </label>
        </div>

        <div class="consent-wrap">
          <div class="consent-title">필수 약관동의</div>
          <div class="consent-note">가입하려면 아래 두 문서를 읽고 모두 동의해야 합니다.</div>

          <div class="consent-list">
            <label class="consent-item">
              <input name="agree_terms" type="checkbox" required>
              <span class="consent-copy">
                <strong>[필수] 이용약관에 동의합니다</strong>
                <span class="consent-links">
                  <a href="{{ url_for('web_auth.terms_document') }}" target="_blank" rel="noopener">전문보기</a>
                </span>
              </span>
            </label>

            <label class="consent-item">
              <input name="agree_privacy" type="checkbox" required>
              <span class="consent-copy">
                <strong>[필수] 개인정보처리방침에 동의합니다</strong>
                <span class="consent-links">
                  <a href="{{ url_for('web_auth.privacy_document') }}" target="_blank" rel="noopener">전문보기</a>
                </span>
              </span>
            </label>
          </div>
        </div>

        <div style="margin-top:12px;">
          <button class="btn solid" type="submit" style="width:100%;">가입하고 시작</button>
        </div>
      </form>
    </section>

  </div>
</div>
{% endblock %}
